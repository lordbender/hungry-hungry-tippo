services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tippo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tippo}
      POSTGRES_DB: ${POSTGRES_DB:-tippo}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tippo} -d ${POSTGRES_DB:-tippo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@hungry-hungry-tippo.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-tippo-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  keycloak-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak}"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    restart: unless-stopped
    command: start-dev --import-realm --hostname=http://localhost:${KEYCLOAK_PORT:-8081} --hostname-strict=false
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - ./infrastructure/keycloak/realm-import:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      API_PORT: 3001
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
      CLAUDE_MAX_TOKENS: ${CLAUDE_MAX_TOKENS:-1024}
      CLAUDE_PROMPT_CACHE_ENABLED: ${CLAUDE_PROMPT_CACHE_ENABLED:-true}
      CLAUDE_WEB_SEARCH_ENABLED: ${CLAUDE_WEB_SEARCH_ENABLED:-true}
      CLAUDE_WEB_SEARCH_MAX_USES: ${CLAUDE_WEB_SEARCH_MAX_USES:-3}
      LOCAL_RESPONSE_CACHE_ENABLED: ${LOCAL_RESPONSE_CACHE_ENABLED:-true}
      LOCAL_RESPONSE_CACHE_TTL_SECONDS: ${LOCAL_RESPONSE_CACHE_TTL_SECONDS:-300}
      KEYCLOAK_AUTH_ENABLED: ${KEYCLOAK_AUTH_ENABLED:-true}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8081/realms/hungry-hungry-tippo}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI:-http://keycloak:8080/realms/hungry-hungry-tippo/protocol/openid-connect/certs}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-hungry-hungry-tippo-web}
      DATABASE_URL: postgres://${POSTGRES_USER:-tippo}:${POSTGRES_PASSWORD:-tippo}@postgres:5432/${POSTGRES_DB:-tippo}
      NODE_ENV: production
      WEB_ORIGIN: http://localhost:${WEB_PORT:-5173}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3001
        VITE_KEYCLOAK_URL: http://localhost:${KEYCLOAK_PORT:-8081}
        VITE_KEYCLOAK_REALM: hungry-hungry-tippo
        VITE_KEYCLOAK_CLIENT_ID: hungry-hungry-tippo-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres-data:
  pgadmin-data:
  keycloak-postgres-data:
